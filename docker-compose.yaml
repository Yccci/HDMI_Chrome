services:
  hdmi-chrome-browser:
    build: .
    image: ghcr.io/yccci/hdmi_chrome:latest
    container_name: hdmi-chrome-browser
    restart: unless-stopped
    privileged: true

    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd
      - /dev/input:/dev/input

    # 飞牛等面板用端口映射；DRM 出屏不依赖 host 网络
    ports:
      - "${BROWSER_PORT:-8088}:8088"
      - "${CHROME_DEBUG_PORT:-9222}:9222"

    environment:
      - NODE_ENV=production
      - BROWSER_PORT=8088
      - BROWSER_HOME_URL=${BROWSER_HOME_URL:-https://www.bing.com}
      - CHROME_DEBUG_PORT=9222
      - BROWSER_DATA_DIR=/app/data
      - BROWSER_MANAGE_CHROME=true
      # auto=有 HDMI connected 用物理屏，否则虚拟屏；也可强制 virtual / hdmi
      - DISPLAY_MODE=${DISPLAY_MODE:-auto}
      - XVFB_RESOLUTION=${XVFB_RESOLUTION:-1920x1080x24}
      - XDG_RUNTIME_DIR=/tmp/runtime-root

    volumes:
      - hdmi-chrome-data:/app/data
      - /dev/dri:/dev/dri

    shm_size: "2gb"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8088/api/url"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  hdmi-chrome-data:
    driver: local
