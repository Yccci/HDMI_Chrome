<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浏览器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      background: #16213e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      z-index: 100;
    }

    .btn {
      background: #0f3460;
      border: none;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #1a5276;
    }

    .btn:active {
      background: #0a2647;
    }

    .url-input {
      flex: 1;
      background: #0a0a1a;
      border: 2px solid #0f3460;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
    }

    .url-input:focus {
      border-color: #e94560;
    }

    .browser-frame {
      flex: 1;
      border: none;
      background: #fff;
    }

    .status {
      background: #16213e;
      padding: 6px 16px;
      font-size: 12px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }

    .quick-links {
      display: flex;
      gap: 8px;
    }

    .quick-link {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .quick-link:hover {
      background: #0f3460;
      color: #fff;
    }

    @media (max-width: 768px) {
      .toolbar {
        padding: 8px 12px;
        gap: 8px;
      }

      .btn {
        padding: 8px 12px;
        font-size: 13px;
      }

      .url-input {
        padding: 8px 12px;
        font-size: 14px;
      }

      .quick-links {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="btn" onclick="goBack()" title="后退">◀</button>
    <button class="btn" onclick="goForward()" title="前进">▶</button>
    <button class="btn" onclick="refresh()" title="刷新">⟳</button>
    <input type="text" class="url-input" id="urlInput" placeholder="输入网址..." 
           onkeydown="if(event.key==='Enter')navigate()">
    <button class="btn" onclick="navigate()">前往</button>
    <button class="btn" onclick="goHome()" title="首页">🏠</button>
    <div class="quick-links">
      <span class="quick-link" onclick="setUrl('https://www.bing.com')">必应</span>
      <span class="quick-link" onclick="setUrl('https://www.baidu.com')">百度</span>
      <span class="quick-link" onclick="setUrl('https://www.bilibili.com')">B站</span>
    </div>
  </div>

  <iframe id="browserFrame" class="browser-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>

  <div class="status">
    <span id="statusText">就绪</span>
    <span id="currentUrl">-</span>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const browserFrame = document.getElementById('browserFrame');
    const statusText = document.getElementById('statusText');
    const currentUrlDisplay = document.getElementById('currentUrl');

    // 初始化时获取当前 URL
    async function init() {
      try {
        const response = await fetch('/api/url');
        const data = await response.json();
        if (data.url) {
          setUrl(data.url);
        }
      } catch (error) {
        console.error('Failed to get initial URL:', error);
      }
    }

    function setUrl(url) {
      urlInput.value = url;
      navigate();
    }

    async function navigate() {
      let url = urlInput.value.trim();
      
      // 如果没有协议，自动添加 https://
      if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }

      if (!url) return;

      statusText.textContent = '加载中...';
      currentUrlDisplay.textContent = url;

      try {
        // 通知后端更新 URL
        await fetch('/api/url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        // 在 iframe 中加载
        browserFrame.src = url;
        
        browserFrame.onload = () => {
          statusText.textContent = '就绪';
        };
        
        browserFrame.onerror = () => {
          statusText.textContent = '加载失败';
        };
      } catch (error) {
        statusText.textContent = '错误: ' + error.message;
      }
    }

    function goBack() {
      browserFrame.contentWindow?.history.back();
    }

    function goForward() {
      browserFrame.contentWindow?.history.forward();
    }

    function refresh() {
      browserFrame.src = browserFrame.src;
    }

    async function goHome() {
      try {
        const response = await fetch('/api/reset', { method: 'POST' });
        const data = await response.json();
        if (data.url) {
          setUrl(data.url);
        }
      } catch (error) {
        console.error('Failed to reset:', error);
      }
    }

    // 初始化
    init();
  </script>
</body>
</html>
