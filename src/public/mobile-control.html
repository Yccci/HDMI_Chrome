<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HDMI Chrome Browser - 手机控制</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* 顶部导航 */
    .top-bar {
      background: #000;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .url-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 10px 12px;
      border-radius: 20px;
      font-size: 14px;
    }
    
    .url-input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    .go-btn {
      background: #e94560;
      border: none;
      color: #fff;
      padding: 10px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }
    
    /* 触摸板区域 */
    .touchpad {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 130px;
      background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .touchpad-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #444;
      font-size: 14px;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    
    .touchpad-hint.hidden {
      opacity: 0;
    }
    
    .touchpad-hint .icon {
      font-size: 48px;
      margin-bottom: 8px;
    }
    
    /* 光标 */
    .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      background: rgba(233, 69, 96, 0.8);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      display: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
    }
    
    /* 快捷键 */
    .quick-keys {
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      background: #000;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .quick-key {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
    }
    
    .quick-key:active {
      background: rgba(255,255,255,0.2);
    }
    
    .quick-key.special {
      background: rgba(233, 69, 96, 0.3);
      color: #e94560;
    }
    
    /* 底部工具栏 */
    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .toolbar-btn {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 12px 8px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    .toolbar-btn:active {
      background: rgba(255,255,255,0.2);
    }
    
    .toolbar-btn .icon {
      font-size: 20px;
    }
    
    .toolbar-btn .label {
      font-size: 10px;
      color: #888;
    }
    
    /* 虚拟键盘 */
    .keyboard-panel {
      position: fixed;
      bottom: 130px;
      left: 0;
      right: 0;
      background: #000;
      padding: 10px;
      display: none;
      z-index: 200;
    }
    
    .keyboard-panel.show {
      display: block;
    }
    
    .keyboard-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }
    
    .keyboard-key {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 12px 4px;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
    }
    
    .keyboard-key:active {
      background: rgba(255,255,255,0.2);
    }
    
    .keyboard-key.wide {
      grid-column: span 2;
    }
    
    .keyboard-key.special {
      background: rgba(233, 69, 96, 0.3);
      color: #e94560;
      font-size: 12px;
    }
    
    /* 设置面板 */
    .settings-panel {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      bottom: 130px;
      background: rgba(0,0,0,0.95);
      padding: 20px;
      display: none;
      z-index: 200;
      overflow-y: auto;
    }
    
    .settings-panel.show {
      display: block;
    }
    
    .settings-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .setting-label {
      color: #888;
      font-size: 15px;
    }
    
    .setting-value {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .slider {
      width: 150px;
      -webkit-appearance: none;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      outline: none;
    }
    
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #e94560;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .value-display {
      color: #e94560;
      font-weight: 600;
      min-width: 35px;
      text-align: right;
    }
    
    .toggle-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    .toggle-btn.active {
      background: #e94560;
    }
    
    /* 状态指示 */
    .status-indicator {
      position: fixed;
      top: 52px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 6px 10px;
      border-radius: 12px;
      font-size: 11px;
      color: #888;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    
    .status-dot.connected {
      background: #4ade80;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <input type="text" class="url-input" id="urlInput" value="{{CURRENT_URL}}" placeholder="输入网址...">
    <button class="go-btn" onclick="navigate()">前往</button>
  </div>

  <div class="status-indicator">
    <div class="status-dot" id="connectionDot"></div>
    <span id="connectionStatus">连接中...</span>
  </div>

  <div class="touchpad" id="touchpad">
    <div class="touchpad-hint" id="touchpadHint">
      <div class="icon">👆</div>
      <div>触摸区域</div>
      <div style="font-size: 12px; color: #333; margin-top: 4px;">
        单指滑动 = 移动鼠标<br>
        单击 = 左键<br>
        长按 = 右键<br>
        双指滑动 = 滚动
      </div>
    </div>
  </div>

  <div class="cursor" id="cursor"></div>

  <div class="quick-keys">
    <button class="quick-key special" onclick="sendKey('Escape')">ESC</button>
    <button class="quick-key" onclick="sendKey('Tab')">Tab</button>
    <button class="quick-key" onclick="sendKey('Backspace')">←</button>
    <button class="quick-key special" onclick="sendKey('Enter')">Enter</button>
    <button class="quick-key" onclick="sendKey('ArrowUp')">↑</button>
    <button class="quick-key" onclick="sendKey('ArrowDown')">↓</button>
    <button class="quick-key" onclick="sendKey('ArrowLeft')">←</button>
    <button class="quick-key" onclick="sendKey('ArrowRight')">→</button>
    <button class="quick-key special" onclick="toggleKeyboard()">⌨️</button>
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" onclick="goBack()">
      <span class="icon">◀</span>
      <span class="label">返回</span>
    </button>
    <button class="toolbar-btn" onclick="goForward()">
      <span class="icon">▶</span>
      <span class="label">前进</span>
    </button>
    <button class="toolbar-btn" onclick="refreshPage()">
      <span class="icon">🔄</span>
      <span class="label">刷新</span>
    </button>
    <button class="toolbar-btn" onclick="toggleSettings()">
      <span class="icon">⚙️</span>
      <span class="label">设置</span>
    </button>
    <button class="toolbar-btn" onclick="goHome()">
      <span class="icon">🏠</span>
      <span class="label">首页</span>
    </button>
  </div>

  <div class="keyboard-panel" id="keyboardPanel">
    <div class="keyboard-grid" id="keyboardGrid"></div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">控制设置</div>
    <div class="setting-item">
      <span class="setting-label">触摸灵敏度</span>
      <div class="setting-value">
        <input type="range" class="slider" id="sensitivitySlider" min="0.5" max="3" step="0.1" value="1">
        <span class="value-display" id="sensitivityValue">1.0</span>
      </div>
    </div>
    <div class="setting-item">
      <span class="setting-label">振动反馈</span>
      <div class="setting-value">
        <button class="toggle-btn active" id="vibrationToggle" onclick="toggleVibration()">开启</button>
      </div>
    </div>
    <div class="setting-item">
      <span class="setting-label">光标显示</span>
      <div class="setting-value">
        <button class="toggle-btn active" id="cursorToggle" onclick="toggleCursor()">开启</button>
      </div>
    </div>
    <div class="setting-item">
      <span class="setting-label">长按时间</span>
      <div class="setting-value">
        <input type="range" class="slider" id="longPressSlider" min="300" max="1000" step="50" value="500">
        <span class="value-display" id="longPressValue">500ms</span>
      </div>
    </div>
  </div>

  <script>
    // 状态
    let isConnected = false;
    let sensitivity = 1.0;
    let enableVibration = true;
    let showCursor = true;
    let longPressTime = 500;
    
    // 触摸状态
    let touchStartX = 0;
    let touchStartY = 0;
    let lastTouchX = 0;
    let lastTouchY = 0;
    let touchStartTime = 0;
    let isLongPress = false;
    let longPressTimer = null;
    let touchCount = 0;
    
    // 虚拟键盘
    const keyboardKeys = [
      '1', '2', '3', '4', '5', '6', '7', '8', '9', '0',
      'q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p',
      'a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l',
      'z', 'x', 'c', 'v', 'b', 'n', 'm', '.',
      'Space', 'Backspace', 'Enter'
    ];
    
    const cursor = document.getElementById('cursor');
    const touchpad = document.getElementById('touchpad');
    const touchpadHint = document.getElementById('touchpadHint');
    const connectionDot = document.getElementById('connectionDot');
    const connectionStatus = document.getElementById('connectionStatus');
    
    // API 调用
    async function api(url, method = 'POST', body = null) {
      const options = { method };
      if (body) {
        options.headers = { 'Content-Type': 'application/json' };
        options.body = JSON.stringify(body);
      }
      const response = await fetch(url, options);
      return response.json();
    }
    
    // 初始化虚拟键盘
    function initKeyboard() {
      const grid = document.getElementById('keyboardGrid');
      grid.innerHTML = '';
      
      keyboardKeys.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'keyboard-key';
        
        if (key === 'Space') {
          btn.textContent = '空格';
          btn.classList.add('wide');
          btn.style.gridColumn = 'span 4';
        } else if (key === 'Backspace') {
          btn.textContent = '← 删除';
          btn.classList.add('special');
        } else if (key === 'Enter') {
          btn.textContent = '↵ 回车';
          btn.classList.add('special');
        } else {
          btn.textContent = key;
        }
        
        btn.addEventListener('click', () => {
          if (key === 'Space') {
            api('/api/keyboard/type', 'POST', { text: ' ' });
          } else if (key === 'Backspace') {
            api('/api/keyboard/key', 'POST', { key: 'Backspace' });
          } else if (key === 'Enter') {
            api('/api/keyboard/key', 'POST', { key: 'Enter' });
          } else {
            api('/api/keyboard/type', 'POST', { text: key });
          }
          
          if (enableVibration) {
            navigator.vibrate?.(10);
          }
        });
        
        grid.appendChild(btn);
      });
    }
    
    // 振动
    function vibrate(duration = 15) {
      if (enableVibration && navigator.vibrate) {
        navigator.vibrate(duration);
      }
    }
    
    // 更新状态
    function updateStatus() {
      connectionDot.className = `status-dot ${isConnected ? 'connected' : ''}`;
      connectionStatus.textContent = isConnected ? '已连接' : '未连接';
    }
    
    // 定期检查状态
    async function checkStatus() {
      try {
        const data = await api('/api/url', 'GET');
        isConnected = data.connected || false;
        updateStatus();
      } catch {
        isConnected = false;
        updateStatus();
      }
    }
    
    setInterval(checkStatus, 3000);
    checkStatus();
    
    // 触摸事件
    touchpad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      
      touchCount = e.touches.length;
      
      if (touchCount === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        lastTouchX = touchStartX;
        lastTouchY = touchStartY;
        touchStartTime = Date.now();
        isLongPress = false;
        
        touchpadHint.classList.add('hidden');
        
        // 长按检测
        longPressTimer = setTimeout(() => {
          isLongPress = true;
          vibrate(30);
        }, longPressTime);
      }
    });
    
    touchpad.addEventListener('touchmove', (e) => {
      e.preventDefault();
      
      if (touchCount === 1) {
        // 单指移动 = 鼠标移动
        const deltaX = (e.touches[0].clientX - lastTouchX) * sensitivity;
        const deltaY = (e.touches[0].clientY - lastTouchY) * sensitivity;
        
        // 获取触摸板位置
        const rect = touchpad.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        const touchY = e.touches[0].clientY - rect.top;
        
        // 更新光标位置
        if (showCursor) {
          cursor.style.display = 'block';
          cursor.style.left = `${e.touches[0].clientX}px`;
          cursor.style.top = `${e.touches[0].clientY}px`;
        }
        
        // 发送鼠标移动
        api('/api/mouse/move', 'POST', { 
          x: touchX * (1920 / rect.width), 
          y: touchY * (1080 / rect.height) 
        });
        
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (touchCount === 2) {
        // 双指滑动 = 滚动
        const deltaY = (e.touches[0].clientY - lastTouchY) * 2;
        api('/api/mouse/scroll', 'POST', { deltaX: 0, deltaY: -deltaY });
        
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });
    
    touchpad.addEventListener('touchend', (e) => {
      e.preventDefault();
      
      clearTimeout(longPressTimer);
      
      if (touchCount === 1) {
        const duration = Date.now() - touchStartTime;
        const rect = touchpad.getBoundingClientRect();
        const x = (lastTouchX - touchStartX) * (1920 / rect.width);
        const y = (lastTouchY - touchStartY) * (1080 / rect.height);
        
        if (isLongPress) {
          // 长按 = 右键
          api('/api/mouse/click', 'POST', { 
            x: lastTouchX * (1920 / rect.width), 
            y: lastTouchY * (1080 / rect.height), 
            button: 'right' 
          });
          vibrate(50);
        } else if (duration < 300 && Math.abs(x) < 10 && Math.abs(y) < 10) {
          // 短按 = 左键
          api('/api/mouse/click', 'POST', { 
            x: lastTouchX * (1920 / rect.width), 
            y: lastTouchY * (1080 / rect.height), 
            button: 'left' 
          });
          vibrate(10);
        }
      }
      
      touchCount = 0;
      cursor.style.display = 'none';
      touchpadHint.classList.remove('hidden');
    });
    
    // 导航
    async function navigate() {
      let url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      await api('/api/url', 'POST', { url });
    }
    
    async function goBack() { await api('/api/back'); vibrate(); }
    async function goForward() { await api('/api/forward'); vibrate(); }
    async function refreshPage() { await api('/api/refresh'); vibrate(); }
    async function goHome() { await api('/api/home'); vibrate(); }
    
    async function sendKey(key) {
      await api('/api/keyboard/key', 'POST', { key });
      vibrate();
    }
    
    // 切换显示
    function toggleKeyboard() {
      document.getElementById('keyboardPanel').classList.toggle('show');
      document.getElementById('settingsPanel').classList.remove('show');
      vibrate();
    }
    
    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('show');
      document.getElementById('keyboardPanel').classList.remove('show');
      vibrate();
    }
    
    // 设置
    function toggleVibration() {
      enableVibration = !enableVibration;
      const btn = document.getElementById('vibrationToggle');
      btn.textContent = enableVibration ? '开启' : '关闭';
      btn.classList.toggle('active', enableVibration);
    }
    
    function toggleCursor() {
      showCursor = !showCursor;
      const btn = document.getElementById('cursorToggle');
      btn.textContent = showCursor ? '开启' : '关闭';
      btn.classList.toggle('active', showCursor);
    }
    
    document.getElementById('sensitivitySlider').addEventListener('input', (e) => {
      sensitivity = parseFloat(e.target.value);
      document.getElementById('sensitivityValue').textContent = sensitivity.toFixed(1);
    });
    
    document.getElementById('longPressSlider').addEventListener('input', (e) => {
      longPressTime = parseInt(e.target.value);
      document.getElementById('longPressValue').textContent = `${longPressTime}ms`;
    });
    
    // URL 输入回车
    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        navigate();
      }
    });
    
    // 初始化
    initKeyboard();
  </script>
</body>
</html>
